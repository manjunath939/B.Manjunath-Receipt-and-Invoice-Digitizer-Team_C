<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link rel="stylesheet" href="/static/css/auth.css">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #eef2ff, #e0e7ff);
}

/* Soft ambient glow */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 250px;
    height: 250px;
    background: rgba(99,102,241,0.12);
    border-radius: 50%;
    filter: blur(70px);
    z-index: -1;
}

body::before { top: -60px; left: -60px; }
body::after { bottom: -60px; right: -60px; }

/* ===== CARD ===== */
.card {
    width: 400px;
    padding: 45px;
    position: relative;
    border-radius: 22px;
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* Gradient border */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 24px;
    background: linear-gradient(135deg, #4f46e5, #6366f1, #8b5cf6);
    z-index: -2;
}

.card::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #ffffff;
    border-radius: 20px;
    z-index: -1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== HEADING ===== */
.card h2 {
    margin-bottom: 8px;
    font-weight: 700;
    font-size: 24px;
    color: #111827;
}

.subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 30px;
}

/* ===== INPUT ===== */
.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group input {
    width: 100%;
    height: 48px;
    padding: 0 18px;
    border-radius: 50px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
    background: #f9fafb;
    transition: all 0.3s ease;
}

.input-group input:focus {
    background: #ffffff;
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
    outline: none;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    height: 48px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79,70,229,0.35);
}

/* ===== FLASH MESSAGES ===== */
.flash {
    margin-bottom: 15px;
    font-size: 14px;
    color: #dc2626;
}

/* ===== LINKS ===== */
.auth-links a {
    display: block;
    margin-top: 18px;
    text-decoration: none;
    color: #4f46e5;
    font-size: 14px;
}

.auth-links a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="card">
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your registered email to receive OTP</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
        <div class="input-group">
            <input name="email" placeholder="Registered Email" required>
        </div>

        <button>Send OTP</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>
</div>

</body>
</html>
