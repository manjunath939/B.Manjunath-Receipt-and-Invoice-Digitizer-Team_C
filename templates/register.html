<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link rel="stylesheet" href="/static/css/auth.css">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    opacity: 0;
    animation: fadePage 0.5s ease forwards;
}

@keyframes fadePage {
    to { opacity: 1; }
}

/* ===== CARD ===== */
.card {
    width: 420px;
    padding: 45px;
    position: relative;
    border-radius: 22px;
    text-align: center;
    animation: fadeIn 0.6s ease;
}

.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 24px;
    background: linear-gradient(135deg, #4f46e5, #6366f1, #8b5cf6, #6366f1);
    background-size: 300% 300%;
    animation: borderMove 6s ease infinite;
    z-index: -2;
}

@keyframes borderMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #ffffff;
    border-radius: 20px;
    z-index: -1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.card h2 {
    margin-bottom: 8px;
    font-weight: 700;
    font-size: 24px;
    color: #111827;
}

.subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 30px;
}

/* ===== INPUT GROUP ===== */
.input-group {
    position: relative;
    margin-bottom: 22px;
}

.input-group input,
.input-group select {
    width: 100%;
    height: 48px;
    padding: 0 18px;
    border-radius: 50px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
    background: #f9fafb;
    transition: all 0.3s ease;
}

.input-group label {
    position: absolute;
    left: 18px;
    top: 14px;
    font-size: 14px;
    color: #6b7280;
    pointer-events: none;
    transition: 0.3s ease;
    background: white;
    padding: 0 6px;
}

.input-group input:focus,
.input-group input:not(:placeholder-shown) {
    background: #ffffff;
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 12px;
    color: #4f46e5;
}

/* ===== PASSWORD TOGGLE ===== */
.toggle-password {
    position: absolute;
    right: 18px;
    top: 14px;
    cursor: pointer;
    font-size: 13px;
    color: #6366f1;
}

/* ===== PASSWORD STRENGTH ===== */
.strength {
    height: 6px;
    border-radius: 6px;
    margin-top: 8px;
    background: #e5e7eb;
    overflow: hidden;
}

.strength-bar {
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    height: 48px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79,70,229,0.35);
}

/* Spinner */
.spinner {
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    position: absolute;
    right: 20px;
    top: 15px;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.auth-links {
    margin-top: 20px;
}

.auth-links a {
    text-decoration: none;
    color: #4f46e5;
    font-size: 14px;
    transition: 0.3s;
}

.auth-links a:hover {
    text-decoration: underline;
}

.flash {
    color: red;
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="card">

    <h2>Create Account</h2>
    <p class="subtitle">Join and start managing your documents intelligently</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" id="registerForm">

        <div class="input-group">
            <input name="name" placeholder=" " required>
            <label>Full Name</label>
        </div>

        <div class="input-group">
            <input name="email" placeholder=" " required>
            <label>Email</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" id="password" placeholder=" " required>
            <label>Password</label>
            <span class="toggle-password" onclick="togglePassword()">Show</span>

            <div class="strength">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
        </div>

        <div class="input-group">
            <select name="language" required>
                <option value="" disabled selected hidden></option>
                <option>English</option>
                <option>हिंदी (Hindi)</option>
                <option>தமிழ் (Tamil)</option>
                <option>తెలుగు (Telugu)</option>
                <option>ಕನ್ನಡ (Kannada)</option>
                <option>മലയാളം (Malayalam)</option>
                <option>বাংলা (Bengali)</option>
                <option>मराठी (Marathi)</option>
            </select>
            <label>Preferred Language</label>
        </div>

        <button type="submit">
            Register
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div class="auth-links">
        <a href="/login">Already have an account? Login</a>
    </div>

</div>

<script>

/* Show/Hide Password */
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* Password Strength */
const passwordInput = document.getElementById("password");
const strengthBar = document.getElementById("strengthBar");

passwordInput.addEventListener("input", () => {
    const val = passwordInput.value;
    let strength = 0;

    if (val.length > 5) strength += 25;
    if (/[A-Z]/.test(val)) strength += 25;
    if (/[0-9]/.test(val)) strength += 25;
    if (/[^A-Za-z0-9]/.test(val)) strength += 25;

    strengthBar.style.width = strength + "%";

    if (strength <= 25) strengthBar.style.background = "red";
    else if (strength <= 50) strengthBar.style.background = "orange";
    else if (strength <= 75) strengthBar.style.background = "#6366f1";
    else strengthBar.style.background = "green";
});

/* Loading Spinner */
document.getElementById("registerForm").addEventListener("submit", function(){
    document.getElementById("spinner").style.display = "block";
});

/* Smooth page transition */
document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e){
        e.preventDefault();
        document.body.style.opacity = "0";
        setTimeout(() => {
            window.location = this.href;
        }, 300);
    });
});

</script>

</body>
</html>
