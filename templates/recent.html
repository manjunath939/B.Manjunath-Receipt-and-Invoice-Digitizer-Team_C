<!DOCTYPE html>
<html>
<head>
    <title>Recent Documents</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        a.button {
            padding: 6px 12px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<h2>🕒 Recent Documents</h2>

<table>
    <tr>
        <th>Vendor</th>
        <th>Uploaded Date</th>
        <th>Original</th>
        <th>Extracted</th>
        <th>Location</th>
    </tr>

    {% for doc in documents %}
    <tr>
        <td>{{ doc[1] or "—" }}</td>
        <td>{{ doc[2] }}</td>

        <td>
            <a class="button" href="/download/{{ doc[0] }}">
                Original
            </a>
        </td>

        <td>
            <a class="button" href="/download-ocr/pdf/{{ doc[0] }}">
                {% if doc[3] == 1 %}
                    Edited PDF
                {% else %}
                    Extracted PDF
                {% endif %}
            </a>
        </td>

        <td>
            {% if doc[4] and doc[5] %}
                <a class="button"
                   href="https://www.google.com/maps?q={{ doc[4] }},{{ doc[5] }}"
                   target="_blank">
                   View
                </a>
            {% else %}
                —
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/dashboard">← Back to Dashboard</a>

</body>
</html>
