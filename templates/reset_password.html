<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<link rel="stylesheet" href="/static/css/auth.css">

<style>

/* ===== DARKER SECURE BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #eef2ff, #dbeafe);
}

/* Subtle secure glow */
body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(79,70,229,0.15);
    border-radius: 50%;
    filter: blur(90px);
    top: -100px;
    right: -100px;
    z-index: -1;
}

/* ===== CARD ===== */
.card {
    width: 420px;
    padding: 50px;
    border-radius: 24px;
    position: relative;
    text-align: center;
    animation: slideUp 0.6s ease;
}

/* Premium animated border */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    background: linear-gradient(135deg, #4f46e5, #6366f1, #8b5cf6);
    background-size: 300% 300%;
    animation: borderMove 5s ease infinite;
    z-index: -2;
}

.card::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #ffffff;
    border-radius: 22px;
    z-index: -1;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes borderMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== HEADING ===== */
.card h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #111827;
}

.subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 35px;
}

/* ===== INPUT GROUP ===== */
.input-group {
    position: relative;
    margin-bottom: 22px;
}

.input-group input {
    width: 100%;
    height: 48px;
    padding: 0 18px;
    border-radius: 50px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
    background: #f9fafb;
    transition: all 0.3s ease;
}

.input-group input:focus {
    background: #ffffff;
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
    outline: none;
}

/* ===== PASSWORD TOGGLE ===== */
.password-wrapper {
    position: relative;
}

.toggle-password {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: #6366f1;
    cursor: pointer;
    font-weight: 600;
}

/* ===== PASSWORD STRENGTH ===== */
.strength {
    text-align: left;
    font-size: 12px;
    margin-top: 6px;
    color: #6b7280;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    height: 48px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79,70,229,0.35);
}

/* ===== FLASH ===== */
.flash {
    margin-bottom: 15px;
    font-size: 14px;
    color: #dc2626;
}

/* ===== LINKS ===== */
.auth-links a {
    display: block;
    margin-top: 18px;
    text-decoration: none;
    color: #4f46e5;
    font-size: 14px;
}

.auth-links a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="card">
    <h2>Reset Your Password</h2>
    <p class="subtitle">Enter the OTP and create a new secure password</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">

        <div class="input-group">
            <input name="otp" placeholder="Enter OTP" required>
        </div>

        <div class="input-group password-wrapper">
            <input id="password" type="password" name="password" placeholder="New Password" required>
            <span class="toggle-password" onclick="togglePassword()">Show</span>
            <div class="strength" id="strengthText"></div>
        </div>

        <button>Reset Password</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const toggle = document.querySelector(".toggle-password");

    if (input.type === "password") {
        input.type = "text";
        toggle.textContent = "Hide";
    } else {
        input.type = "password";
        toggle.textContent = "Show";
    }
}

const passwordInput = document.getElementById("password");
const strengthText = document.getElementById("strengthText");

passwordInput.addEventListener("input", function () {
    const val = passwordInput.value;
    if (val.length < 6) {
        strengthText.textContent = "Weak password";
        strengthText.style.color = "#dc2626";
    } else if (val.length < 10) {
        strengthText.textContent = "Medium strength";
        strengthText.style.color = "#f59e0b";
    } else {
        strengthText.textContent = "Strong password";
        strengthText.style.color = "#16a34a";
    }
});
</script>

</body>
</html>
