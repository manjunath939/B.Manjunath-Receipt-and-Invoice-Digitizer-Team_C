<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="/static/css/auth.css">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #eef2ff, #e0e7ff);
}

/* Soft ambient glow */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 250px;
    height: 250px;
    background: rgba(99,102,241,0.12);
    border-radius: 50%;
    filter: blur(70px);
    z-index: -1;
}

body::before { top: -60px; left: -60px; }
body::after { bottom: -60px; right: -60px; }

/* ===== CARD ===== */
.card {
    width: 400px;
    padding: 45px;
    position: relative;
    border-radius: 22px;
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* Animated premium gradient border */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 24px;
    background: linear-gradient(135deg, #4f46e5, #6366f1, #8b5cf6, #6366f1);
    background-size: 300% 300%;
    animation: borderMove 6s ease infinite;
    z-index: -2;
}

@keyframes borderMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #ffffff;
    border-radius: 20px;
    z-index: -1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== HEADING ===== */
.card h2 {
    margin-bottom: 8px;
    font-weight: 700;
    font-size: 24px;
    color: #111827;
}

.welcome {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 30px;
}

/* ===== FLOATING INPUTS ===== */
.input-group {
    position: relative;
    margin-bottom: 22px;
}

/* ===== PASSWORD TOGGLE ===== */
.password-wrapper {
    position: relative;
}

.toggle-password {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: #6366f1;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
}

.input-group input {
    width: 100%;
    height: 48px;
    padding: 0 18px;
    border-radius: 50px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
    background: #f9fafb;
    transition: all 0.3s ease;
}

.input-group label {
    position: absolute;
    left: 18px;
    top: 14px;
    font-size: 14px;
    color: #6b7280;
    pointer-events: none;
    transition: 0.3s ease;
    background: white;
    padding: 0 6px;
}

.input-group input:focus,
.input-group input:not(:placeholder-shown) {
    background: #ffffff;
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 12px;
    color: #4f46e5;
}

/* ===== LOGIN BUTTON ===== */
button {
    width: 100%;
    height: 48px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79,70,229,0.35);
}

/* ===== GOOGLE BUTTON ===== */
.google-btn {
    margin-top: 16px;
    width: 100%;
    height: 48px;
    border-radius: 50px;
    border: 1px solid #e5e7eb;
    background: #ffffff;
    font-weight: 600;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: #444;
    transition: 0.3s ease;
}

.google-btn:hover {
    background: #f3f4f6;
    transform: translateY(-2px);
}

/* ===== MASCOT ===== */
.mascot {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

svg {
    width: 140px;
    height: 140px;
}

/* Mascot interactions preserved */
.eye {
    transition: transform 0.2s ease, opacity 0.2s ease;
}

body.email-focus .eye {
    transform: translateX(4px);
}

body.password-focus .eye {
    opacity: 0;
}

.hand {
    transition: transform 0.35s ease;
}

body.password-focus .hand.left {
    transform: translate(45px, -70px);
}

body.password-focus .hand.right {
    transform: translate(-45px, -70px);
}

/* SUCCESS / ERROR preserved */
@keyframes greenBlink {
    0% { background: #b7f7c1; }
    50% { background: #7CFC98; }
    100% { background: #b7f7c1; }
}
body.login-success {
    animation: greenBlink 0.25s ease-in-out 4;
}

@keyframes redBlink {
    0% { background: #ffe5e5; }
    50% { background: #ff4d4d; }
    100% { background: #ffe5e5; }
}
body.login-error {
    animation: redBlink 0.4s ease-in-out 5;
}

.auth-links a {
    display: block;
    margin-top: 8px;
    text-decoration: none;
    color: #4f46e5;
    font-size: 14px;
}

.auth-links a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="card">

    <div class="mascot">
        <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="70" fill="#FFD9B3"/>
            <circle class="eye" cx="75" cy="90" r="6" fill="#000"/>
            <circle class="eye" cx="125" cy="90" r="6" fill="#000"/>
            <path d="M80 120 Q100 135 120 120"
                  stroke="#000" stroke-width="4" fill="none"/>
            <rect class="hand left" x="40" y="130" width="30" height="50"
                  rx="15" fill="#FFD9B3"/>
            <rect class="hand right" x="130" y="130" width="30" height="50"
                  rx="15" fill="#FFD9B3"/>
        </svg>
    </div>

    <h2>Welcome Back</h2>
    <p class="welcome">Sign in to continue to your workspace</p>

    {% for m in get_flashed_messages() %}
        <p style="color:red">{{ m }}</p>
    {% endfor %}

    <form method="post">
        <div class="input-group">
            <input id="email" name="email" placeholder=" " required>
            <label for="email">Email</label>
        </div>

        <div class="input-group password-wrapper">
    <input id="password" type="password" name="password" placeholder=" " required>
    <label for="password">Password</label>
    <span class="toggle-password" onclick="togglePassword()">Show</span>
</div>

        <button>Login</button>
    </form>

    <a href="{{ url_for('google.login') }}" class="google-btn">
        Continue with Google
    </a>

    <div class="auth-links">
        <a href="/forgot-password">Forgot Password?</a>
        <a href="/register">Register</a>
    </div>

</div>

<script>
const email = document.getElementById("email");
const password = document.getElementById("password");

email.addEventListener("focus", () => {
    document.body.classList.add("email-focus");
    document.body.classList.remove("password-focus");
});
email.addEventListener("blur", () => {
    document.body.classList.remove("email-focus");
});
password.addEventListener("focus", () => {
    document.body.classList.add("password-focus");
});
password.addEventListener("blur", () => {
    document.body.classList.remove("password-focus");
});

function togglePassword() {
    const passwordInput = document.getElementById("password");
    const toggleText = document.querySelector(".toggle-password");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleText.textContent = "Hide";
    } else {
        passwordInput.type = "password";
        toggleText.textContent = "Show";
    }
}
</script>

{% if login_success %}
<script>
    document.body.classList.add("login-success");
    setTimeout(() => {
        window.location.href = "{{ url_for('dashboard') }}";
    }, 1000);
</script>
{% endif %}

{% if get_flashed_messages() %}
<script>
    document.body.classList.add("login-error");
    setTimeout(() => {
        document.body.classList.remove("login-error");
    }, 2000);

    
</script>
{% endif %}

</body>
</html>
