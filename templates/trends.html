<!DOCTYPE html>
<html>
<head>
    <title>Trends Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .container {
            padding: 50px 100px;
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        select {
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .back-btn {
            text-decoration: none;
            background: white;
            color: #764ba2;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #f1f1f1;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            height: 500px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📊 Document Trends ({{ year }})</h1>

        <div class="controls">
            <form method="GET" action="/trends">
                <select name="year" onchange="this.form.submit()">
                    {% for y in allowed_years %}
                        <option value="{{ y }}" {% if y == year %}selected{% endif %}>
                            {{ y }}
                        </option>
                    {% endfor %}
                </select>
            </form>

            <a href="/dashboard" class="back-btn">← Dashboard</a>
        </div>
    </div>

    <div class="card">
        <canvas id="trendChart"></canvas>
    </div>

    <div class="footer">
        Analytics powered by Receipt & Invoice Digitizer 🚀
    </div>

</div>

<script id="trend-data" type="application/json">
{
  "labels": {{ labels | tojson }},
  "values": {{ values | tojson }}
}
</script>

<script>
const trendData = JSON.parse(
    document.getElementById("trend-data").textContent
);

new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
        labels: trendData.labels,
        datasets: [{
            label: "Documents Uploaded",
            data: trendData.values,
            borderColor: "#ffffff",
            backgroundColor: "rgba(255,255,255,0.2)",
            fill: true,
            tension: 0.4,
            pointBackgroundColor: "#ffffff",
            pointRadius: 5
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                labels: {
                    color: "white"
                }
            }
        },
        scales: {
            x: {
                ticks: { color: "white" }
            },
            y: {
                beginAtZero: true,
                ticks: { color: "white" }
            }
        }
    }
});
</script>

</body>
</html>
