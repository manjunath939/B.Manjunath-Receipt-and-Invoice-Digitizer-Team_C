<!DOCTYPE html>
<html>
<head>
    <title>Documents by Vendor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body>

<div class="topbar">
    <div class="top-left">
        <h2>📁 Documents by Vendor</h2>
    </div>

    <div class="topbar-right">
        <a href="/dashboard">⬅ Back to Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div style="padding:40px;">
    <div style="background:white; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">

        {% if labels and values %}
            <canvas id="vendorChart"></canvas>
        {% else %}
            <p>No documents available yet.</p>
        {% endif %}

    </div>
</div>

{% if labels and values %}
<script>
document.addEventListener("DOMContentLoaded", function() {

    const vendorLabels = JSON.parse('{{ labels | tojson }}');
    const vendorValues = JSON.parse('{{ values | tojson }}');

    const ctx = document.getElementById('vendorChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: vendorLabels,
            datasets: [{
                label: 'Number of Documents',
                data: vendorValues,
                backgroundColor: 'rgba(99, 102, 241, 0.7)',
                borderRadius: 6,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { precision: 0 }
                }
            }
        }
    });

});
</script>
{% endif %}

</body>
</html>
