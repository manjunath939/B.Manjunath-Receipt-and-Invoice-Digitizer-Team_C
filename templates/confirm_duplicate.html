<!DOCTYPE html>
<html>
<head>
    <title>Duplicate Detected</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#1e293b,#0f172a);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card {
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:15px;
            text-align:center;
            width:400px;
        }
        button {
            padding:10px 20px;
            margin:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
        .continue { background:#22c55e; color:white; }
        .cancel { background:#ef4444; color:white; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚠ Duplicate Document Detected</h2>
    <p>{{ original_filename }} already exists.</p>
    <p>Do you want to upload it again?</p>

    <form method="post" action="/confirm-duplicate">
        <input type="hidden" name="filename" value="{{ filename }}">
        <input type="hidden" name="doc_type" value="{{ doc_type }}">

        <button name="action" value="continue" class="continue">Continue Upload</button>
        <button name="action" value="cancel" class="cancel">Cancel</button>
    </form>
</div>

</body>
</html>
